<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bạn có 1 tin nhắn</title>

<style>

body{
background:#ffd6e7;
font-family:Arial;
text-align:center;
margin:0;
}

#box{

background:white;

width:90%;
max-width:420px;

margin:auto;

margin-top:80px;

padding:30px;

border-radius:20px;

box-shadow:0 0 15px rgba(0,0,0,0.1);

position:relative;

}

h2{
margin-bottom:20px;
}

button{

padding:12px 22px;

border:none;

border-radius:12px;

cursor:pointer;

margin:10px;

font-size:18px;

}

#yesBtn{

background:#00c853;
color:white;

}

#noBtn{

background:#ff1744;
color:white;

position:absolute;

left:220px;
top:140px;

}

#talk{

margin-top:20px;

font-weight:bold;

color:#ff4081;

}

#messageBox{

display:none;

margin-top:20px;

}

input{

width:80%;

padding:10px;

border-radius:10px;

border:1px solid #ccc;

}

#sendBtn{

background:#ff4081;
color:white;

}

</style>

</head>

<body>

<div id="box">

<h2>Bạn có 1 tin nhắn 💌</h2>

<button id="yesBtn">Đồng ý ❤️</button>

<button id="noBtn">Không đâu 😜</button>

<div id="talk"></div>

<div id="messageBox">

<input id="msg" placeholder="Lời nhắn của bạn">

<br>

<button id="sendBtn">Gửi</button>

<div id="sent"></div>

</div>

</div>

<script>

const noBtn = document.getElementById("noBtn")
const yesBtn = document.getElementById("yesBtn")
const talk = document.getElementById("talk")
const messageBox = document.getElementById("messageBox")

const texts = [

"Anh buồn đó 🥺",
"Đừng từ chối mà 😭",
"Cho anh cơ hội đi",
"Anh thích em thật mà",
"Nhấn đồng ý đi ❤️",
"Đừng làm anh thất vọng",
"Thử lại lần nữa nha",
"Thật sự không đồng ý sao 😢"

]

let i = 0


function moveButton(){

let x = Math.random()*250
let y = Math.random()*200

noBtn.style.left = x + "px"
noBtn.style.top = y + "px"

noBtn.innerText = texts[i]

i++

if(i >= texts.length){
i = 0
}

}


// desktop hover

noBtn.addEventListener("mouseover", moveButton)


// mobile touch

noBtn.addEventListener("touchstart", moveButton)


// đồng ý

yesBtn.onclick = function(){

talk.innerHTML = "Yayyy ❤️ Anh biết mà!"

messageBox.style.display = "block"

}


// gửi tin

document.getElementById("sendBtn").onclick = function(){

let msg = document.getElementById("msg").value

if(msg === ""){

alert("Hãy nhập lời nhắn")

return

}

document.getElementById("sent").innerHTML = "✅ Đã gửi lời nhắn!"

}

</script>

</body>
</html>
